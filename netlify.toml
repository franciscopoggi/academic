# Static site — no build step. Netlify serves the simple-site folder as-is.
# (explicit no-op command overrides the old hugo command saved in the Netlify UI)
[build]
  command = "echo 'static site, no build'"
  publish = "simple-site"

# ---- Redirects from old Wowchemy/Hugo URLs ----
# Old publication pages -> new research page
[[redirects]]
  from = "/publication/*"
  to = "/research.html"
  status = 301

# Old talk pages -> research page
[[redirects]]
  from = "/talk/*"
  to = "/research.html"
  status = 301

# Old course pages -> home (course PDFs still served under /files/microiii and /files/LawEcon)
[[redirects]]
  from = "/courses/*"
  to = "/"
  status = 301

# Old blog posts and author pages -> home
[[redirects]]
  from = "/post/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301
